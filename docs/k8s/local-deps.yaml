# NUR für den lokalen kind-Nachweis: MySQL + Redis im Cluster.
# Demo-Werte, keine echten Secrets. Kein Persistent Volume (Wegwerf).
# Services heißen "mysql"/"redis" -> das Helm-Chart findet sie per DNS.
---
apiVersion: v1
kind: Namespace
metadata:
  name: angel-lara
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: angel-lara
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          args: ["--default-authentication-plugin=mysql_native_password"]
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "secret" # DEMO
            - name: MYSQL_DATABASE
              value: "bagisto"
            - name: MYSQL_USER
              value: "bagisto"
            - name: MYSQL_PASSWORD
              value: "secret" # DEMO
          ports:
            - containerPort: 3306
          readinessProbe:
            exec:
              command: ["sh", "-c", "mysqladmin ping -h 127.0.0.1 -psecret"]
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: angel-lara
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: angel-lara
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: angel-lara
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
