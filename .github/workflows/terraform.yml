name: Terraform

# Validiert die Terraform-Konfiguration. KEIN apply, KEIN AWS, KEINE Credentials.

on:
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
  pull_request:
    branches: [main]
    paths:
      - "infra/terraform/**"

permissions:
  contents: read

jobs:
  validate:
    name: fmt + init + validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Format prüfen
        run: terraform fmt -check -recursive

      - name: Init (ohne Backend, ohne AWS)
        run: terraform init -backend=false -input=false

      - name: Validate
        run: terraform validate
