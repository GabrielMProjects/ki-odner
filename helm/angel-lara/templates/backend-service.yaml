apiVersion: v1
kind: Service
metadata:
  name: {{ include "angel-lara.backend.fullname" . }}
  labels:
    {{- include "angel-lara.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "angel-lara.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
