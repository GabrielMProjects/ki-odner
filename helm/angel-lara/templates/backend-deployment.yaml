apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "angel-lara.backend.fullname" . }}
  labels:
    {{- include "angel-lara.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "angel-lara.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      annotations:
        # Rollt die Pods automatisch bei ConfigMap/Secret-Aenderung.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        {{- include "angel-lara.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        # ── nginx: HTTP :8000, statische Assets + /storage, PHP -> php-fpm@127.0.0.1:9000 ──
        - name: nginx
          image: "{{ include "angel-lara.backend.image" . }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          # Nur nginx; legt das public/storage-Symlink an (PVC ist gemountet).
          command: ["sh", "-c"]
          args:
            - 'ln -sfn /var/www/html/storage/app/public /var/www/html/public/storage; exec nginx -g "daemon off;"'
          ports:
            - name: http
              containerPort: 8000
          {{- with .Values.backend.probes.startup }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backend.probes.readiness }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backend.probes.liveness }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          {{- if .Values.backend.persistence.enabled }}
          volumeMounts:
            - name: public-storage
              mountPath: {{ .Values.backend.persistence.mountPath }}
          {{- end }}
        # ── php-fpm: eigener Container, FPM im Vordergrund -> stdout/stderr = Container-Log ──
        - name: php-fpm
          image: "{{ include "angel-lara.backend.image" . }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          # Rechte sicherstellen, dann FPM im Vordergrund (Laravel-Logs -> Container-stdout).
          command: ["sh", "-c"]
          args:
            - 'chown -R www-data:www-data storage bootstrap/cache 2>/dev/null || true; exec php-fpm -F'
          envFrom:
            {{- include "angel-lara.envFrom" . | nindent 12 }}
          env:
            - name: OTEL_SERVICE_NAME
              value: angel-lara-backend
          # LOG_CHANNEL=stderr kommt ueber die ConfigMap (envFrom).
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          {{- if .Values.backend.persistence.enabled }}
          volumeMounts:
            - name: public-storage
              mountPath: {{ .Values.backend.persistence.mountPath }}
          {{- end }}
      {{- if .Values.backend.persistence.enabled }}
      volumes:
        - name: public-storage
          persistentVolumeClaim:
            claimName: {{ include "angel-lara.backend.fullname" . }}-public
      {{- end }}
