{{- if .Values.keda.enabled }}
# Benötigt einen installierten KEDA-Operator im Cluster (keda.sh).
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "angel-lara.worker.fullname" . }}
  labels:
    {{- include "angel-lara.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  scaleTargetRef:
    name: {{ include "angel-lara.worker.fullname" . }}
  minReplicaCount: {{ .Values.keda.minReplicas }}
  maxReplicaCount: {{ .Values.keda.maxReplicas }}
  pollingInterval: {{ .Values.keda.pollingInterval }}
  cooldownPeriod: {{ .Values.keda.cooldownPeriod }}
  triggers:
    # Redis-Scaler: skaliert nach der Laenge der Laravel-Queue-List (echte Metrik).
    - type: redis
      metadata:
        address: {{ .Values.keda.redis.address | quote }}
        listName: {{ .Values.keda.redis.listName | quote }}
        listLength: {{ .Values.keda.redis.listLength | quote }}
        databaseIndex: {{ .Values.keda.redis.databaseIndex | quote }}
        enableTLS: {{ .Values.keda.redis.enableTLS | quote }}
      {{- if .Values.secrets.REDIS_PASSWORD }}
      authenticationRef:
        name: {{ include "angel-lara.fullname" . }}-keda-redis-auth
      {{- end }}
{{- if .Values.secrets.REDIS_PASSWORD }}
---
# Bindet das Redis-Passwort aus dem App-Secret an den KEDA-Trigger.
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: {{ include "angel-lara.fullname" . }}-keda-redis-auth
  labels:
    {{- include "angel-lara.labels" . | nindent 4 }}
spec:
  secretTargetRef:
    - parameter: password
      name: {{ include "angel-lara.fullname" . }}-secret
      key: REDIS_PASSWORD
{{- end }}
{{- end }}
