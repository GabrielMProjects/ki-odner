# ACHTUNG: Nur Platzhalterwerte. NIEMALS echte Secrets hier committen.
# Echte Werte zur Laufzeit per --set / --set-file / externes Secret (Sealed Secrets, External Secrets) liefern.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "angel-lara.fullname" . }}-secret
  labels:
    {{- include "angel-lara.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
