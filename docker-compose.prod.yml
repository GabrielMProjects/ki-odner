# Produktions-/Demo-Compose für die AWS-EC2.
# Zieht die Images aus ECR (Pull via IAM-Instance-Profile – KEINE Keys auf der Instanz).
# Secrets kommen zur Laufzeit aus einer .env NEBEN dieser Datei (NICHT committet):
#   ECR_REGISTRY=<account>.dkr.ecr.eu-central-1.amazonaws.com
#   IMAGE_TAG=6cb8416
#   APP_KEY=base64:...        (Demo-Key, auf der EC2 erzeugt)
#   DB_PASSWORD=...           (Demo)
#
# Start:  docker compose -f docker-compose.prod.yml up -d

name: angel-lara-demo

services:
  frontend:
    image: ${ECR_REGISTRY}/angel-lara-demo/frontend:${IMAGE_TAG}
    ports:
      - "80:80" # einzige öffentliche Tür; /api,/admin,... proxyt das Frontend ans Backend
    depends_on:
      - backend
    networks: [app-network]
    restart: unless-stopped

  backend:
    image: ${ECR_REGISTRY}/angel-lara-demo/backend:${IMAGE_TAG}
    # KEIN ports: -> Backend ist nur intern erreichbar (nur über den Frontend-Proxy)
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY:?APP_KEY muss in .env gesetzt sein}
      APP_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: bagisto
      DB_USERNAME: bagisto
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_CLIENT: predis
    depends_on:
      - mysql
      - redis
    networks: [app-network]
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: bagisto
      MYSQL_USER: bagisto
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql-data:/var/lib/mysql
    networks: [app-network]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks: [app-network]
    restart: unless-stopped

volumes:
  mysql-data:

networks:
  app-network:
    driver: bridge
