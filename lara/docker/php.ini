; Eigene PHP-Einstellungen für die App (Demo-tauglich).
memory_limit = 512M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 120
max_input_vars = 5000

; Fehler im Container-Log, nicht im Output
display_errors = Off
log_errors = On

; OPcache für Performance
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000
