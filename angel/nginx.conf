server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 64M;

    # Docker-internes DNS – löst den Service-Namen "backend" zur Laufzeit auf,
    # damit nginx auch startet, wenn das Backend kurz nicht erreichbar ist.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Gemeinsame Proxy-Header (vererbt an alle proxy_pass unten)
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Bagisto/Laravel-Pfade → Backend (gleicher Origin, kein localhost, kein CORS) ──
    # ^~ stoppt die Regex-Auswertung, damit z. B. Produktbilder unter /cache
    # zum Backend gehen und NICHT vom statischen Asset-Block abgefangen werden.
    location ^~ /api {
        set $backend backend;
        proxy_pass http://$backend:8000;
    }
    location ^~ /admin {
        set $backend backend;
        proxy_pass http://$backend:8000;
    }
    location ^~ /storage {
        set $backend backend;
        proxy_pass http://$backend:8000;
    }
    location ^~ /cache {
        set $backend backend;
        proxy_pass http://$backend:8000;
    }
    location ^~ /themes {
        set $backend backend;
        proxy_pass http://$backend:8000;
    }
    location ^~ /vendor {
        set $backend backend;
        proxy_pass http://$backend:8000;
    }

    # ── Angular SPA (statisch) ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statische Assets der App cachen
    location ~* \.(?:js|css|png|jpe?g|gif|svg|ico|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }
}
