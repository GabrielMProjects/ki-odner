# Zentraler Telemetrie-Eingang: empfängt OTLP (Traces/Metrics/Logs) und verteilt
# an Tempo (Traces), Prometheus (Metrics, via Scrape) und Loki (Logs).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  # Traces -> Tempo
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  # Metrics -> wird von Prometheus an :8889 abgeholt
  prometheus:
    endpoint: 0.0.0.0:8889
  # Logs -> Loki (OTLP-HTTP)
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
  debug:
    verbosity: basic

service:
  telemetry:
    metrics:
      address: 0.0.0.0:8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki]
