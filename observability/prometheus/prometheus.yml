global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Eigene Metriken des OpenTelemetry Collectors
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]

  # Vom Collector exportierte App-Metriken (Prometheus-Exporter)
  - job_name: otel-collector-app
    static_configs:
      - targets: ["otel-collector:8889"]

  # Beispiel: Laravel/Backend-Metriken – später aktivieren
  # - job_name: laravel-backend
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ["backend:8000"]
