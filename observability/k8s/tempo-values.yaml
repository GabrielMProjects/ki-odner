# grafana/tempo – SingleBinary, lokale Demo.
# Image auf 2.3.1 gepinnt (bereits lokal gecached -> kein erneuter Pull).
# Keine Persistence; OTLP-Receiver (gRPC 4317 / HTTP 4318) aktiv.
tempo:
  repository: grafana/tempo
  tag: "2.3.1"
  retention: 1h
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      memory: 512Mi
  # Container-Mount gehoert unter tempo.* (Chart-Struktur), das Volume top-level.
  extraVolumeMounts:
    - name: tempo-data
      mountPath: /var/tempo

persistence:
  enabled: false

# Daten-Pfad /var/tempo wird ueber einen EIGENSTAENDIGEN PVC (tempo-data) bereitgestellt
# statt emptyDir -> Traces/WAL ueberleben Pod-Neustarts. persistence bleibt false,
# damit der Wechsel eine reine Pod-Template-Aenderung ist (kein StatefulSet-Delete).
# PVC-Manifest: observability/k8s/tempo-pvc.yaml
extraVolumes:
  - name: tempo-data
    persistentVolumeClaim:
      claimName: tempo-data

# Tempo schreibt Traces nach /var/tempo auf den persistenten PVC (local-path, 2Gi)
