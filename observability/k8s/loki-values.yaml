# grafana/loki – SingleBinary, lokale Demo.
# Keine Persistence, keine Caches/Gateway/Canary -> minimaler Footprint.
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  limits_config:
    retention_period: 24h
    allow_structured_metadata: true
  # OTLP-Eingang ist in Loki 3.x integriert (/otlp)

singleBinary:
  replicas: 1
  persistence:
    enabled: false
  # readOnlyRootFilesystem=true + Persistence aus -> /var/loki ist sonst nicht
  # beschreibbar. Beschreibbares emptyDir fuer chunks/rules/ruler-wal mounten.
  extraVolumes:
    - name: data
      emptyDir: {}
  extraVolumeMounts:
    - name: data
      mountPath: /var/loki
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

# In SingleBinary die Scale-Out-Komponenten auf 0
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Optionales aus (Footprint + Disk klein halten)
chunksCache:
  enabled: false
resultsCache:
  enabled: false
lokiCanary:
  enabled: false
gateway:
  enabled: false
test:
  enabled: false
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
