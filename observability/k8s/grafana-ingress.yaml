# Grafana ueber Traefik/nip.io erreichbar machen (kein LoadBalancer, kein extra DNS).
# Route: grafana.<EC2-IP>.nip.io -> Service kps-grafana:80 (kube-prometheus-stack).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: observability
  labels:
    app.kubernetes.io/part-of: observability
spec:
  ingressClassName: traefik
  rules:
    - host: grafana.18.157.163.103.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kps-grafana
                port:
                  number: 80
