# Demo-Konfiguration. KEINE echten Webhooks/Secrets.

global:
  resolve_timeout: 5m

route:
  receiver: "default"
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: "default"
    # Demo: bewusst ohne echtes Ziel. Beispiel (auskommentiert):
    # webhook_configs:
    #   - url: "http://example.invalid/webhook"
    #     send_resolved: true

inhibit_rules:
  - source_matchers: ['severity="critical"']
    target_matchers: ['severity="warning"']
    equal: ["alertname"]
