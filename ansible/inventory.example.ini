# Beispiel-Inventory.
#
# So benutzen:
#   1) Diese Datei nach "inventory.ini" kopieren.
#   2) Die öffentliche IP deiner EC2-Instanz eintragen (Terraform-Output: compute_public_ip).
#
# WICHTIG:
# - "inventory.ini" wird NICHT eingecheckt (siehe .gitignore).
# - Hier stehen KEINE Secrets. Der private SSH-Key liegt nur lokal bei dir.

[k3s]
# Beispiel (Platzhalter-IP) – später durch echte EC2-IP ersetzen:
# 203.0.113.10 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_ed25519

[k3s:vars]
ansible_python_interpreter=/usr/bin/python3
# Optionale Schalter:
# set_timezone=true
# ufw_allow_k8s_api=false
